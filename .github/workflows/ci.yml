name: Nix CI

on:
  push:
    branches: ["main"]
    paths-ignore:
      - "README.md"
      - "LICENSE"
      - ".gitignore"
  pull_request:
    branches: ["main"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: Flake Check & Format
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: Cache Nix store (nixos-cache)
        uses: cachix/cachix-action@v15
        with:
          name: nixpkgs
          skipPush: true

      - name: Show flake metadata
        run: nix flake show --all-systems

      - name: Check formatting
        run: nix fmt -- --check .

      - name: Run flake checks
        run: nix flake check --show-trace

  build:
    name: Build NixOS Configuration
    runs-on: ubuntu-latest
    needs: check
    permissions:
      contents: read
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Nix
        uses: cachix/install-nix-action@v31
        with:
          extra_nix_config: |
            experimental-features = nix-command flakes
            accept-flake-config = true

      - name: Cache Nix store (nixos-cache)
        uses: cachix/cachix-action@v15
        with:
          name: nixpkgs
          skipPush: true

      - name: Build nixos configuration
        run: nix build .#nixosConfigurations.nixos.config.system.build.toplevel --no-link --show-trace
